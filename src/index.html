<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Journal</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for the trend chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div id="title-bar"></div>
        <!-- Header -->
        <header class="app-header">
            <h1 id="app-title">📓 Decision Journal</h1>
            <div class="header-actions">
                <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </header>



        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Column: Table -->
            <section class="table-section">
                <div class="table-container">
                    <table id="journal-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Action</th>
                                <th>Rules</th>
                                <th>Rules Followed</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
                <div class="table-actions">
                    <button id="add-row-btn" class="primary-btn">＋ Add Row</button>
                </div>
            </section>

            <!-- Right Column: Stats & Chart -->
            <section class="sidebar-section">
                <!-- Stats -->
                <div class="stats-container">
                    <h2>📊 Summary</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Yes</div>
                            <div id="stat-yes" class="stat-value text-success">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">No</div>
                            <div id="stat-no" class="stat-value text-danger">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Rate</div>
                            <div id="stat-rate" class="stat-value text-primary">0%</div>
                        </div>
                    </div>
                </div>

                <!-- Chart -->
                <div class="chart-container">
                    <h2>📈 Compliance Trend</h2>
                    <div class="chart-wrapper">
                        <canvas id="trend-chart"></canvas>
                    </div>
                    <p class="caption">Cumulative "Yes" rate over entries, ordered chronologically.</p>
                </div>
            </section>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙️ Settings</h2>
                    <button id="close-modal-btn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="csv-path-input">📂 CSV File Path</label>
                        <div class="input-group">
                            <input type="text" id="csv-path-input" readonly>
                            <button id="browse-file-btn" class="secondary-btn">Browse File</button>
                        </div>
                    </div>

                    <p class="caption">Data is saved automatically whenever you edit the table.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Renderer Script -->
    <script src="renderer.js"></script>
</body>
</html>
